version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gradience-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:/app/data/gradience.db?mode=rwc
      - GRADIENCE_DATA_DIR=/app/data
      - ORIGIN=${ORIGIN:-https://wallet.example.com}
      - RP_ID=${RP_ID:-wallet.example.com}
