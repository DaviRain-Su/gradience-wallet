name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./web
        run: |
          npm install
          npm run build

      - name: Build release binary
        run: cargo build --release -p gradience-cli --bin gradience

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/gradience dist/gradience
          chmod +x dist/gradience
          tar czf gradience-x86_64-unknown-linux-gnu.tar.gz -C dist gradience

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradience-x86_64-unknown-linux-gnu.tar.gz
          path: gradience-x86_64-unknown-linux-gnu.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./web
        run: |
          npm install
          npm run build

      - name: Build aarch64 binary
        run: cargo build --release -p gradience-cli --bin gradience --target aarch64-apple-darwin

      - name: Build x86_64 binary
        run: cargo build --release -p gradience-cli --bin gradience --target x86_64-apple-darwin

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/gradience dist/gradience
          chmod +x dist/gradience
          tar czf gradience-aarch64-apple-darwin.tar.gz -C dist gradience
          cp target/x86_64-apple-darwin/release/gradience dist/gradience
          chmod +x dist/gradience
          tar czf gradience-x86_64-apple-darwin.tar.gz -C dist gradience

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: gradience-*.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
