version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gradience-api
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:/app/data/gradience.db?mode=rwc
      - GRADIENCE_DATA_DIR=/app/data
      - ORIGIN=${ORIGIN:-https://wallet.example.com}
      - RP_ID=${RP_ID:-wallet.example.com}

  caddy:
    image: caddy:2-alpine
    container_name: gradience-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
