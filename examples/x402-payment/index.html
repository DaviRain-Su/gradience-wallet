<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradience x402 Payment Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-6">
  <div class="max-w-xl mx-auto space-y-6">
    <h1 class="text-2xl font-bold text-emerald-400">Gradience Payment — x402 Example</h1>

    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
      <h2 class="font-semibold text-gray-200">1. Connection</h2>
      <div class="flex gap-2">
        <input id="apiBase" type="text" value="http://localhost:8080" class="flex-1 bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm" />
        <input id="token" type="password" placeholder="JWT token" class="flex-1 bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm" />
      </div>
      <p class="text-xs text-gray-400">Send a real on-chain payment through Gradience Wallet.</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-4">
      <h2 class="font-semibold text-gray-200">2. Payment Details</h2>

      <label class="block text-sm text-gray-400">From Wallet</label>
      <select id="walletId" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm">
        <option value="">Select wallet</option>
      </select>

      <label class="block text-sm text-gray-400 mt-2">Recipient Address</label>
      <input id="to" type="text" placeholder="0x..." class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm" />

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-gray-400">Amount</label>
          <input id="amount" type="text" value="0.001" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-sm text-gray-400">Chain</label>
          <select id="chain" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm">
            <option value="base">Base</option>
            <option value="ethereum">Ethereum</option>
          </select>
        </div>
      </div>

      <button onclick="sendPayment()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded">
        Send Payment
      </button>
    </div>

    <div id="result" class="hidden bg-gray-900 border border-gray-800 rounded-lg p-4">
      <h2 class="font-semibold text-gray-200 mb-2">Result</h2>
      <div id="resultBody" class="text-sm text-gray-300 font-mono break-all"></div>
    </div>

    <div id="log" class="font-mono text-xs text-gray-400 bg-gray-900 border border-gray-800 rounded-lg p-4 min-h-[6rem]"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function log(msg) {
      const el = $('log');
      el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    function apiBase() { return $('apiBase').value.trim() || 'http://localhost:8080'; }
    function headers() {
      const h = { 'Content-Type': 'application/json' };
      const t = $('token').value.trim();
      if (t) h['Authorization'] = `Bearer ${t}`;
      return h;
    }

    async function loadWallets() {
      try {
        const res = await fetch(`${apiBase()}/api/wallets`, { headers: headers() });
        if (!res.ok) throw new Error(await res.text());
        const wallets = await res.json();
        const sel = $('walletId');
        sel.innerHTML = '<option value="">Select wallet</option>';
        wallets.forEach((w) => {
          const opt = document.createElement('option');
          opt.value = w.id;
          opt.textContent = w.name;
          sel.appendChild(opt);
        });
        log(`Loaded ${wallets.length} wallet(s)`);
      } catch (e) {
        log(`Load wallets error: ${e.message}`);
      }
    }

    async function sendPayment() {
      const walletId = $('walletId').value;
      const to = $('to').value.trim();
      const amount = $('amount').value.trim();
      const chain = $('chain').value;
      if (!walletId || !to || !amount) {
        log('Please fill in all fields.');
        return;
      }
      try {
        log('Sending payment...');
        const res = await fetch(`${apiBase()}/api/wallets/${walletId}/fund`, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ to, amount, chain })
        });
        const text = await res.text();
        const data = JSON.parse(text);
        if (!res.ok) throw new Error(data.error || text);
        log(`Payment sent! Tx: ${data.tx_hash}`);
        $('result').classList.remove('hidden');
        $('resultBody').innerHTML = `<div class="text-emerald-400">Success</div><div>Tx Hash: ${data.tx_hash}</div>`;
      } catch (e) {
        log(`Payment error: ${e.message}`);
        $('result').classList.remove('hidden');
        $('resultBody').innerHTML = `<div class="text-rose-400">Error: ${e.message}</div>`;
      }
    }

    loadWallets();
  </script>
</body>
</html>
